name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript compiler
        run: npm run build

      - name: Build bootstrap toolchain
        run: npm run build:toolchain

      - name: Compiler parity + bootstrap fixed-point
        run: npm run test:ci

      - name: Run Synth example tests
        run: npm test
