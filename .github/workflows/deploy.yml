name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build compiler
        run: npx tsc

      - name: Run tests
        run: npm test

      - name: Upload demo/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
